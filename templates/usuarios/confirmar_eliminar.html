{% extends "base.html" %}
{% block titulo %}Desactivar usuario{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-danger">
      <div class="card-body p-4 text-center">
        <i class="bi bi-person-dash display-4 text-danger"></i>
        <h5 class="mt-3">¿Desactivar a {{ object }}?</h5>
        <p class="text-muted small">El usuario no podrá iniciar sesión hasta que sea reactivado.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">Sí, desactivar</button>
          <a href="{% url 'usuarios:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
