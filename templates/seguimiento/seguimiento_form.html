{% extends 'base.html' %}
{% block titulo %}Asignar técnico{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
    <div class="col-lg-7">

        <div class="mb-4">
            <div class="dp-eyebrow">Seguimiento</div>

            <h1 class="dp-title">
                Asignar técnico
            </h1>
        </div>

        <div class="dp-card p-4">

            <div class="mb-4">
                <div class="dp-section-label">
                    Configuración
                </div>

                <h5 class="mb-0 fw-semibold">
                    Asignar técnico a la cita
                </h5>
            </div>

            <form method="post" enctype="multipart/form-data">
                {% csrf_token %}

                {% include "partials/_form_card.html" with cancel_url="seguimiento:lista" %}

            </form>

        </div>

    </div>
</div>
{% endblock %}
