{% extends "base.html" %}
{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<div class="container py-5">
    <div class="mb-4">
        <a href="{% url 'servicios:admin_lista' %}" class="btn-pill-ghost text-decoration-none">
            <i class="bi bi-arrow-left me-2"></i>Regresar a la lista
        </a>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-9">
            
            <div class="dp-eyebrow">Administración</div>
            <h1 class="dp-title mb-4">{{ titulo }}</h1>

            <!-- Contenedor Premium de Cueto -->
            <div class="dp-card p-4 p-md-5">
                <form method="post" enctype="multipart/form-data" novalidate>
                    {% csrf_token %}
                    
                    <!-- Incluimos el parcial pasándole los parámetros limpios -->
                    {% include "partials/_form_card.html" with texto_boton="Guardar servicio" cancel_url="servicios:admin_lista" %}
                    
                </form>
            </div>

        </div>
    </div>
</div>
{% endblock %}
