{% extends "base.html" %}
{% block titulo %}Reactivar usuario{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm border-success">
      <div class="card-body p-4 text-center">
        <i class="bi bi-person-plus display-4 text-success"></i>
        <h5 class="mt-3">¿Reactivar a {{ object }}?</h5>
        <p class="text-muted small">El usuario podrá iniciar sesión una vez reactivado.</p>
        <form method="post" class="d-flex gap-2 justify-content-center mt-3">
          {% csrf_token %}
          <button type="submit" class="btn btn-success">Sí, reactivar</button>
          <a href="{% url 'usuarios:lista' %}" class="btn btn-outline-secondary">Cancelar</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
