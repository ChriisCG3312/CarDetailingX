{% extends "base.html" %}
{% block titulo %}Desactivar usuario{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="dp-card border-0 text-center p-4">
      <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle"
           style="width: 64px; height: 64px; background: #F6E7E2; color: #B5563E; font-size: 1.8rem;">
        <i class="bi bi-person-dash"></i>
      </div>
      <h2 class="dp-title mb-2" style="font-size: 1.3rem;">¿Desactivar a {{ object }}?</h2>
      <p class="small mb-0" style="color: #9A948A;">El usuario no podrá iniciar sesión hasta que sea reactivado.</p>

      <form method="post" class="d-flex gap-2 justify-content-center mt-4 pt-3" style="border-top: 1px dashed #E4DFD6;">
        {% csrf_token %}
        <button type="submit" class="btn-pill-primary" style="background: #B5563E; color: #fff;">
          <i class="bi bi-person-dash me-1"></i>Sí, desactivar
        </button>
        <a href="{% url 'usuarios:lista' %}" class="btn-pill-ghost">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
