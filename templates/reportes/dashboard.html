{% extends "base.html" %}

{% block titulo %}
Dashboard de reportes
{% endblock %}


{% block contenido %}

<div class="container py-4">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1>
            <i class="bi bi-bar-chart-line"></i>
            Dashboard de reportes
        </h1>
    </div>


    <div class="row g-4">

        <!-- Ingresos del mes -->
        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h5 class="card-title">
                        <i class="bi bi-cash-stack"></i>
                        Ingresos del mes
                    </h5>

                    <h2 class="text-success">
                        ${{ ingresos_mes }}
                    </h2>

                </div>

            </div>

        </div>


        <!-- Citas pendientes -->
        <div class="col-md-6">

            <div class="card shadow-sm">

                <div class="card-body">

                    <h5 class="card-title">
                        <i class="bi bi-calendar-check"></i>
                        Citas pendientes de hoy
                    </h5>

                    <h2 class="text-warning">
                        {{ citas_pendientes_hoy }}
                    </h2>

                </div>

            </div>

        </div>


    </div>


    <!-- Accesos rápidos -->
    <div class="row g-4 mt-3">


        <div class="col-md-3">

            <a 
                href="{% url 'reportes:ingresos' %}"
                class="text-decoration-none"
            >

                <div class="card h-100 shadow-sm">

                    <div class="card-body text-center">

                        <i class="bi bi-cash fs-1"></i>

                        <h5 class="mt-2">
                            Ingresos
                        </h5>

                    </div>

                </div>

            </a>

        </div>


        <div class="col-md-3">

            <a 
                href="{% url 'reportes:citas_estado' %}"
                class="text-decoration-none"
            >

                <div class="card h-100 shadow-sm">

                    <div class="card-body text-center">

                        <i class="bi bi-pie-chart fs-1"></i>

                        <h5 class="mt-2">
                            Citas por estado
                        </h5>

                    </div>

                </div>

            </a>

        </div>


        <div class="col-md-3">

            <a 
                href="{% url 'reportes:servicios_top' %}"
                class="text-decoration-none"
            >

                <div class="card h-100 shadow-sm">

                    <div class="card-body text-center">

                        <i class="bi bi-stars fs-1"></i>

                        <h5 class="mt-2">
                            Servicios top
                        </h5>

                    </div>

                </div>

            </a>

        </div>


        <div class="col-md-3">

            <a 
                href="{% url 'reportes:tecnicos' %}"
                class="text-decoration-none"
            >

                <div class="card h-100 shadow-sm">

                    <div class="card-body text-center">

                        <i class="bi bi-person-gear fs-1"></i>

                        <h5 class="mt-2">
                            Técnicos
                        </h5>

                    </div>

                </div>

            </a>

        </div>


    </div>

</div>

{% endblock %}
