{% extends "base.html" %}
{% block titulo %}{{ titulo }}{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-lg-8">
    <div class="dp-card border-0">
      <div class="p-4 pb-0">
        <p class="dp-eyebrow" style="color: var(--dp-ceramico);">Formulario</p>
        <h2 class="dp-title mb-0" style="font-size: 1.5rem;">{{ titulo }}</h2>
      </div>
      <div class="p-4">
        <form method="post" enctype="multipart/form-data">
          {% csrf_token %}
          {% include "partials/_form_card.html" with form=form cancel_url="usuarios:lista" %}
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
