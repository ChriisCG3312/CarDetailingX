{% extends "base.html" %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow bg-dark text-white border-danger">
                <div class="card-header bg-danger text-white py-3">
                    <h5 class="mb-0 m-0">
                        <i class="bi bi-exclamation-triangle-fill"></i> ¿Confirmar eliminación?
                    </h5>
                </div>
                <div class="card-body p-4 text-center">
                    <p class="fs-5">
                        Estás a punto de eliminar permanentemente el servicio:
                    </p>
                    <h3 class="text-warning mb-4">"{{ object.nombre }}"</h3>
                    <p class="text-muted small">
                        Esta acción no se puede deshacer y el servicio se borrará de la base de datos de forma definitiva.
                    </p>

                    <form method="post">
                        {% csrf_token %}
                        <div class="d-flex justify-content-center gap-3 mt-4">
                            <a href="{% url 'servicios:admin_lista' %}" class="btn btn-secondary px-4">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-danger px-4">
                                <i class="bi bi-trash-fill"></i> Eliminar Definitivamente
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
