{% extends "base.html" %}

{% block contenido %}
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="mb-3">
                <a href="{% url 'servicios:admin_lista' %}" class="btn btn-sm btn-outline-secondary">
                    <i class="bi bi-arrow-left"></i> Regresar al catálogo
                </a>
            </div>

            <div class="card shadow bg-dark text-white border-secondary">
                <div class="card-header border-secondary table-secondary py-3">
                    <h4 class="mb-0 m-0">
                        <i class="bi bi-pencil-square text-success"></i> 
                        {% if object %} Editar Servicio: {{ object.nombre }} {% else %} Registrar Nuevo Servicio {% endif %}
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form method="post" enctype="multipart/form-data" novalidate>
                        {% csrf_token %}
                        
                        {% include "partials/_form_card.html" %}

                        <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
                            <a href="{% url 'servicios:admin_lista' %}" class="btn btn-secondary me-md-2">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-success px-4">
                                <i class="bi bi-check-circle"></i> Guardar Servicio
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
