{% extends "base.html" %}
{% block titulo %}Reactivar usuario{% endblock %}

{% block contenido %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="dp-card border-0 text-center p-4">
      <div class="mx-auto mb-3 d-flex align-items-center justify-content-center rounded-circle"
           style="width: 64px; height: 64px; background: #E3F0EA; color: var(--dp-ceramico); font-size: 1.8rem;">
        <i class="bi bi-person-check"></i>
      </div>
      <h2 class="dp-title mb-2" style="font-size: 1.3rem;">¿Reactivar a {{ object }}?</h2>
      <p class="small mb-0" style="color: #9A948A;">El usuario podrá iniciar sesión una vez reactivado.</p>

      <form method="post" class="d-flex gap-2 justify-content-center mt-4 pt-3" style="border-top: 1px dashed #E4DFD6;">
        {% csrf_token %}
        <button type="submit" class="btn-pill-primary" style="background: var(--dp-ceramico); color: #fff;">
          <i class="bi bi-check2 me-1"></i>Sí, reactivar
        </button>
        <a href="{% url 'usuarios:lista' %}" class="btn-pill-ghost">Cancelar</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
